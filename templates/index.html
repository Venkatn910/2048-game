<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>2048</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── reset & base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #1a1a18;
  --surface:    #242420;
  --border:     #333330;
  --header-fg:  #f0ede6;
  --score-bg:   #2e2e2a;
  --score-fg:   #f0ede6;
  --score-lbl:  #888880;
  --grid-bg:    #2a2a26;
  --cell-bg:    #383832;
  --gap:        12px;
  --radius:     10px;
  --cell-size:  min(18vw, 108px);
  --font-display: 'Bebas Neue', sans-serif;
  --font-body:    'DM Sans', sans-serif;

  /* tile palette */
  --t2:    #eee4da; --t2-fg:    #776e65;
  --t4:    #ede0c8; --t4-fg:    #776e65;
  --t8:    #f2b179; --t8-fg:    #f9f6f2;
  --t16:   #f59563; --t16-fg:   #f9f6f2;
  --t32:   #f67c5f; --t32-fg:   #f9f6f2;
  --t64:   #f65e3b; --t64-fg:   #f9f6f2;
  --t128:  #edcf72; --t128-fg:  #f9f6f2;
  --t256:  #edcc61; --t256-fg:  #f9f6f2;
  --t512:  #edc850; --t512-fg:  #f9f6f2;
  --t1024: #edc53f; --t1024-fg: #f9f6f2;
  --t2048: #edc22e; --t2048-fg: #f9f6f2;
  --tsuper:#3ecf8e; --tsuper-fg:#f9f6f2;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--header-fg);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 16px 32px;
  gap: 16px;
  overflow: hidden;
}

/* ── background texture ──────────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(237,194,46,.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 90%, rgba(246,94,59,.05) 0%, transparent 60%);
  pointer-events: none;
}

/* ── header ──────────────────────────────────────────────────────────────── */
header {
  width: 100%;
  max-width: 480px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.logo {
  font-family: var(--font-display);
  font-size: clamp(52px, 14vw, 80px);
  color: var(--t2048);
  letter-spacing: 2px;
  line-height: 1;
  text-shadow: 0 0 40px rgba(237,194,46,.35);
}

.scores {
  display: flex;
  gap: 8px;
}

.score-box {
  background: var(--score-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 14px;
  text-align: center;
  min-width: 80px;
}
.score-box .label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--score-lbl);
}
.score-box .value {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--score-fg);
  letter-spacing: 1px;
  transition: transform .15s;
}
.score-box .value.bump {
  animation: bump .2s ease;
}
@keyframes bump {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.3); color: var(--t2048); }
  100% { transform: scale(1); }
}

/* ── controls row ────────────────────────────────────────────────────────── */
.controls {
  width: 100%;
  max-width: 480px;
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: space-between;
}

.tagline {
  font-size: 12px;
  color: var(--score-lbl);
  max-width: 200px;
  line-height: 1.4;
}

.btn-row { display: flex; gap: 8px; }

button {
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: .5px;
  cursor: pointer;
  border: none;
  border-radius: 8px;
  padding: 9px 16px;
  transition: transform .1s, opacity .1s;
}
button:active { transform: scale(.95); }

.btn-new {
  background: var(--t2048);
  color: #1a1a18;
}
.btn-continue {
  background: var(--tsuper);
  color: #1a1a18;
  display: none;
}

/* ── grid wrapper ────────────────────────────────────────────────────────── */
.grid-wrap {
  position: relative;
  background: var(--grid-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: var(--gap);
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
}

.grid-bg {
  display: grid;
  grid-template-columns: repeat(4, var(--cell-size));
  grid-template-rows:    repeat(4, var(--cell-size));
  gap: var(--gap);
}

.cell-bg {
  background: var(--cell-bg);
  border-radius: calc(var(--radius) - 2px);
  width: var(--cell-size);
  height: var(--cell-size);
}

/* tiles layer sits on top, perfectly aligned */
.tiles-layer {
  position: absolute;
  top: var(--gap);
  left: var(--gap);
  display: grid;
  grid-template-columns: repeat(4, var(--cell-size));
  grid-template-rows:    repeat(4, var(--cell-size));
  gap: var(--gap);
}

/* ── tile ─────────────────────────────────────────────────────────────────── */
.tile {
  width: var(--cell-size);
  height: var(--cell-size);
  border-radius: calc(var(--radius) - 2px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: clamp(18px, 5vw, 36px);
  letter-spacing: 1px;
  transition: background .08s, color .08s;
  animation: pop .15s ease;
  will-change: transform;
}
@keyframes pop {
  0%   { transform: scale(.85); opacity: .7; }
  70%  { transform: scale(1.07); }
  100% { transform: scale(1);   opacity: 1; }
}

.tile[data-val="0"]    { background: transparent; }
.tile[data-val="2"]    { background: var(--t2);    color: var(--t2-fg); }
.tile[data-val="4"]    { background: var(--t4);    color: var(--t4-fg); }
.tile[data-val="8"]    { background: var(--t8);    color: var(--t8-fg); }
.tile[data-val="16"]   { background: var(--t16);   color: var(--t16-fg); font-size: clamp(15px,4.5vw,32px); }
.tile[data-val="32"]   { background: var(--t32);   color: var(--t32-fg); font-size: clamp(15px,4.5vw,32px); }
.tile[data-val="64"]   { background: var(--t64);   color: var(--t64-fg); font-size: clamp(15px,4.5vw,32px); }
.tile[data-val="128"]  { background: var(--t128);  color: var(--t128-fg); font-size: clamp(13px,4vw,28px); }
.tile[data-val="256"]  { background: var(--t256);  color: var(--t256-fg); font-size: clamp(13px,4vw,28px); }
.tile[data-val="512"]  { background: var(--t512);  color: var(--t512-fg); font-size: clamp(13px,4vw,28px); }
.tile[data-val="1024"] { background: var(--t1024); color: var(--t1024-fg); font-size: clamp(11px,3.5vw,24px); }
.tile[data-val="2048"] { background: var(--t2048); color: var(--t2048-fg); font-size: clamp(11px,3.5vw,24px);
                         box-shadow: 0 0 28px rgba(237,194,46,.6); }

/* super tiles (4096+) */
.tile.super         { background: var(--tsuper); color: var(--tsuper-fg); font-size: clamp(10px,3vw,22px);
                      box-shadow: 0 0 28px rgba(62,207,142,.5); }

/* ── overlay ─────────────────────────────────────────────────────────────── */
.overlay {
  display: none;
  position: absolute;
  inset: 0;
  border-radius: 14px;
  background: rgba(26,26,24,.88);
  backdrop-filter: blur(4px);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 10;
  animation: fadeIn .3s ease;
}
.overlay.show { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; transform: scale(.97); }
  to   { opacity: 1; transform: scale(1); }
}

.overlay-title {
  font-family: var(--font-display);
  font-size: 42px;
  letter-spacing: 3px;
}
.overlay.won  .overlay-title { color: var(--t2048); text-shadow: 0 0 30px rgba(237,194,46,.5); }
.overlay.over .overlay-title { color: #ff6b6b; }

.overlay-sub { font-size: 13px; color: var(--score-lbl); text-align: center; line-height: 1.6; }

.overlay-btns { display: flex; gap: 10px; }

/* ── footer hint ─────────────────────────────────────────────────────────── */
.hint {
  font-size: 11px;
  color: #555550;
  letter-spacing: .3px;
  text-align: center;
}

/* ── swipe overlay (mobile) ──────────────────────────────────────────────── */
.swipe-blocker {
  position: fixed;
  inset: 0;
  z-index: 0;
  touch-action: none;
}

/* ── responsive tweaks ───────────────────────────────────────────────────── */
@media (max-width: 380px) {
  :root { --gap: 8px; --cell-size: min(19vw, 80px); }
  .logo { font-size: 42px; }
  .score-box { min-width: 64px; padding: 6px 10px; }
  .score-box .value { font-size: 18px; }
}
</style>
</head>
<body>

<!-- swipe capture layer (sits behind everything) -->
<div class="swipe-blocker" id="swipeCatcher"></div>

<header>
  <div class="logo">2048</div>
  <div class="scores">
    <div class="score-box">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="label">Best</div>
      <div class="value" id="best">0</div>
    </div>
  </div>
</header>

<div class="controls">
  <p class="tagline">Join tiles to reach <strong>2048</strong>!</p>
  <div class="btn-row">
    <button class="btn-continue" id="btnContinue">Keep Playing</button>
    <button class="btn-new" id="btnNew">New Game</button>
  </div>
</div>

<!-- board -->
<div class="grid-wrap" id="gridWrap">

  <!-- static background cells -->
  <div class="grid-bg" id="bgGrid"></div>

  <!-- dynamic tile layer -->
  <div class="tiles-layer" id="tileLayer"></div>

  <!-- overlays -->
  <div class="overlay won" id="overlayWon">
    <div class="overlay-title">YOU WIN!</div>
    <div class="overlay-sub">You reached the <strong>2048</strong> tile!<br>Keep going for a higher score.</div>
    <div class="overlay-btns">
      <button class="btn-continue" id="overlayKeep" style="display:flex">Keep Playing</button>
      <button class="btn-new" id="overlayRestart">New Game</button>
    </div>
  </div>

  <div class="overlay over" id="overlayOver">
    <div class="overlay-title">GAME OVER</div>
    <div class="overlay-sub">No moves left.<br>Better luck next time!</div>
    <div class="overlay-btns">
      <button class="btn-new" id="overlayRestart2">Try Again</button>
    </div>
  </div>

</div>

<p class="hint">Arrow keys / WASD · Swipe on mobile</p>

<!-- Socket.IO client -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
/* ── init ──────────────────────────────────────────────────────────────────── */
const socket = io();

// build 16 static bg cells
const bgGrid = document.getElementById('bgGrid');
for (let i = 0; i < 16; i++) {
  const d = document.createElement('div');
  d.className = 'cell-bg';
  bgGrid.appendChild(d);
}

/* ── render state ──────────────────────────────────────────────────────────── */
let prevGrid = null;

function render(state) {
  // scores
  animateScore('score', state.score);
  animateScore('best',  state.best);

  // tiles
  const layer = document.getElementById('tileLayer');
  const flat  = state.grid.flat();

  // detect new / changed tiles for pop animation
  const prev = prevGrid ? prevGrid.flat() : Array(16).fill(0);

  // rebuild tiles
  layer.innerHTML = '';
  flat.forEach((val, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile' + (val > 2048 ? ' super' : '');
    tile.dataset.val = val;
    tile.textContent = val || '';

    // pop animation only for new or merged tiles
    if (val !== 0 && val !== prev[i]) {
      tile.style.animation = 'none';
      requestAnimationFrame(() => { tile.style.animation = ''; });
    } else {
      tile.style.animation = 'none';
    }

    layer.appendChild(tile);
  });

  prevGrid = JSON.parse(JSON.stringify(state.grid));

  // overlays
  const overlayWon  = document.getElementById('overlayWon');
  const overlayOver = document.getElementById('overlayOver');
  overlayWon.classList.remove('show');
  overlayOver.classList.remove('show');

  if (state.over) {
    overlayOver.classList.add('show');
  } else if (state.won && !state.keep_playing) {
    overlayWon.classList.add('show');
  }

  // header continue button
  document.getElementById('btnContinue').style.display =
    (state.won && !state.keep_playing) ? 'inline-flex' : 'none';
}

function animateScore(id, val) {
  const el = document.getElementById(id);
  if (el.textContent !== String(val)) {
    el.textContent = val;
    el.classList.remove('bump');
    void el.offsetWidth;   // reflow to restart animation
    el.classList.add('bump');
  }
}

/* ── socket events ──────────────────────────────────────────────────────────── */
socket.on('connect',    ()      => console.log('connected'));
socket.on('state',      state   => render(state));

/* ── controls ────────────────────────────────────────────────────────────────── */
function newGame()      { socket.emit('restart'); }
function keepPlaying()  { socket.emit('keep_playing'); }

document.getElementById('btnNew').addEventListener('click', newGame);
document.getElementById('btnContinue').addEventListener('click', keepPlaying);
document.getElementById('overlayKeep').addEventListener('click', keepPlaying);
document.getElementById('overlayRestart').addEventListener('click', newGame);
document.getElementById('overlayRestart2').addEventListener('click', newGame);

/* ── keyboard ─────────────────────────────────────────────────────────────── */
const KEY_DIR = {
  ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
  a:'left', d:'right', w:'up', s:'down',
  A:'left', D:'right', W:'up', S:'down',
  h:'left', l:'right', k:'up', j:'down',
};

document.addEventListener('keydown', e => {
  const dir = KEY_DIR[e.key];
  if (dir) { e.preventDefault(); socket.emit('move', { direction: dir }); }
});

/* ── swipe / touch ──────────────────────────────────────────────────────────── */
let tx0 = 0, ty0 = 0;
const swipe = document.getElementById('swipeCatcher');

swipe.addEventListener('touchstart', e => {
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
}, { passive: true });

swipe.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  const adx = Math.abs(dx), ady = Math.abs(dy);
  if (Math.max(adx, ady) < 20) return;   // too short

  let dir;
  if (adx > ady) dir = dx > 0 ? 'right' : 'left';
  else           dir = dy > 0 ? 'down'  : 'up';

  socket.emit('move', { direction: dir });
}, { passive: true });
</script>
</body>
</html>
